name: CI

# Build sanity on every push / PR to main: Debug build on all three desktop
# OSes so a broken build is caught early. No signing or packaging here — that's
# release.yml's job.
#
# Speed: compile caching is where the time is saved — macOS reuses Xcode
# DerivedData (incremental, no `clean`), Linux uses ccache. JUCE/GPUAudioSDK are
# pulled by checkout (submodules: recursive); we don't cache the submodule
# working trees (it confused checkout's post-cleanup, and restoring ~1 GB ≈
# re-cloning anyway).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Resolve JUCE SHA (for cache key)
        id: juce
        shell: bash
        run: echo "sha=$(git rev-parse HEAD:ThirdParty/JUCE)" >> "$GITHUB_OUTPUT"
      - name: Cache Xcode DerivedData
        uses: actions/cache@v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ steps.juce.outputs.sha }}-${{ hashFiles('Source/**', 'JuceLibraryCode/**', 'Builds/MacOSX/WFS-DIY.xcodeproj/**') }}
          restore-keys: |
            deriveddata-${{ steps.juce.outputs.sha }}-
            deriveddata-
      - name: Build (Debug, unsigned)
        run: |
          xcodebuild \
            -project Builds/MacOSX/WFS-DIY.xcodeproj \
            -scheme "WFS-DIY - App" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

  windows:
    name: build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3
      - name: Build (Debug x64)
        run: msbuild Builds\VisualStudio2022\WFS-DIY.sln -p:Configuration=Debug -p:Platform=x64 -m

  linux:
    name: build (Linux)
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Apply Linux JUCE patches
        # Enables touch input on Linux (canUseTouch -> true) so the userland
        # evdev multitouch backend works. The submodule ships unpatched, so this
        # must run after checkout and before the build. Idempotent.
        run: tools/apply-linux-juce-patches.sh
      - name: Install JUCE build deps + ccache
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config ccache \
            libasound2-dev libjack-jackd2-dev \
            libfreetype-dev libfontconfig1-dev \
            libgl1-mesa-dev libcurl4-openssl-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libudev-dev
      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-linux-${{ github.sha }}
          restore-keys: |
            ccache-linux-
      - name: Build (Debug)
        run: make -C Builds/LinuxMakefile CONFIG=Debug CXX="ccache g++" -j"$(nproc)"
