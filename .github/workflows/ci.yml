name: CI

# Build sanity on every push / PR to main: Debug build on all three desktop
# OSes so a broken build is caught early. No signing or packaging here — that's
# release.yml's job.
#
# Speed: JUCE + GPUAudioSDK are submodules (JUCE is a large working tree), so we
# cache the checked-out submodules keyed on their pinned SHAs instead of cloning
# every run. Compile caching: macOS reuses Xcode DerivedData (incremental,
# no `clean`); Linux uses ccache. (ccache+xcodebuild is unreliable, so macOS
# uses DerivedData — same warm-build win without touching the compiler.)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
      - name: Pin submodule SHAs
        id: subs
        shell: bash
        run: echo "key=$(git ls-tree HEAD ThirdParty/JUCE ThirdParty/GPUAudioSDK | awk '{print $3}' | tr '\n' '-')" >> "$GITHUB_OUTPUT"
      - name: Cache submodules
        id: subcache
        uses: actions/cache@v5
        with:
          path: |
            ThirdParty/JUCE
            ThirdParty/GPUAudioSDK
          key: subs-${{ runner.os }}-${{ steps.subs.outputs.key }}
      - name: Init submodules (cache miss)
        if: steps.subcache.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive ThirdParty/JUCE ThirdParty/GPUAudioSDK
      - name: Cache Xcode DerivedData
        uses: actions/cache@v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ steps.subs.outputs.key }}-${{ hashFiles('Source/**', 'JuceLibraryCode/**', 'Builds/MacOSX/WFS-DIY.xcodeproj/**') }}
          restore-keys: |
            deriveddata-${{ steps.subs.outputs.key }}-
            deriveddata-
      - name: Build (Debug, unsigned)
        run: |
          xcodebuild \
            -project Builds/MacOSX/WFS-DIY.xcodeproj \
            -scheme "WFS-DIY - App" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

  windows:
    name: build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
      - name: Pin submodule SHAs
        id: subs
        shell: bash
        run: echo "key=$(git ls-tree HEAD ThirdParty/JUCE ThirdParty/GPUAudioSDK | awk '{print $3}' | tr '\n' '-')" >> "$GITHUB_OUTPUT"
      - name: Cache submodules
        id: subcache
        uses: actions/cache@v5
        with:
          path: |
            ThirdParty/JUCE
            ThirdParty/GPUAudioSDK
          key: subs-${{ runner.os }}-${{ steps.subs.outputs.key }}
      - name: Init submodules (cache miss)
        if: steps.subcache.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive ThirdParty/JUCE ThirdParty/GPUAudioSDK
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3
      - name: Build (Debug x64)
        run: msbuild Builds\VisualStudio2022\WFS-DIY.sln -p:Configuration=Debug -p:Platform=x64 -m

  linux:
    name: build (Linux)
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
      - name: Pin submodule SHAs
        id: subs
        shell: bash
        run: echo "key=$(git ls-tree HEAD ThirdParty/JUCE ThirdParty/GPUAudioSDK | awk '{print $3}' | tr '\n' '-')" >> "$GITHUB_OUTPUT"
      - name: Cache submodules
        id: subcache
        uses: actions/cache@v5
        with:
          path: |
            ThirdParty/JUCE
            ThirdParty/GPUAudioSDK
          key: subs-${{ runner.os }}-${{ steps.subs.outputs.key }}
      - name: Init submodules (cache miss)
        if: steps.subcache.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive ThirdParty/JUCE ThirdParty/GPUAudioSDK
      - name: Install JUCE build deps + ccache
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config ccache \
            libasound2-dev libjack-jackd2-dev \
            libfreetype-dev libfontconfig1-dev \
            libgl1-mesa-dev libcurl4-openssl-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libudev-dev
      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-linux-${{ github.sha }}
          restore-keys: |
            ccache-linux-
      - name: Build (Debug)
        run: make -C Builds/LinuxMakefile CONFIG=Debug CXX="ccache g++" -j"$(nproc)"
