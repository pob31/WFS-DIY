name: CI

# Build sanity on every push / PR to main: Debug build on all three desktop
# OSes so a broken build is caught early. No signing or packaging here — that's
# release.yml's job.
#
# Speed: compile caching is where the time is saved — macOS reuses Xcode
# DerivedData (incremental, no `clean`), Linux uses ccache. JUCE is pulled
# by checkout (submodules: recursive); we don't cache the submodule
# working trees (it confused checkout's post-cleanup, and restoring ~1 GB ≈
# re-cloning anyway).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      # Both submodule pins feed the cache key: spatcore is compiled into the
      # app (hashFiles can't see gitlinks, so resolve the SHAs explicitly).
      - name: Resolve submodule SHAs (for cache key)
        id: subs
        shell: bash
        run: |
          echo "juce=$(git rev-parse HEAD:ThirdParty/JUCE)" >> "$GITHUB_OUTPUT"
          echo "spatcore=$(git rev-parse HEAD:spatcore)" >> "$GITHUB_OUTPUT"
      - name: Cache Xcode DerivedData
        uses: actions/cache@v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ steps.subs.outputs.juce }}-${{ steps.subs.outputs.spatcore }}-${{ hashFiles('Source/**', 'JuceLibraryCode/**', 'Builds/MacOSX/WFS-DIY.xcodeproj/**') }}
          restore-keys: |
            deriveddata-${{ steps.subs.outputs.juce }}-${{ steps.subs.outputs.spatcore }}-
            deriveddata-${{ steps.subs.outputs.juce }}-
            deriveddata-
      - name: Build (Debug, unsigned)
        run: |
          xcodebuild \
            -project Builds/MacOSX/WFS-DIY.xcodeproj \
            -scheme "WFS-DIY - App" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

  windows:
    name: build (Windows)
    # windows-2025 = the VS2026 (v145) image — matches the checked-in vcxproj
    # toolset and every dev machine. Keep the explicit pin (not windows-latest)
    # so future image repoints stay a deliberate choice.
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      # No CUDA toolkit needed: the app builds with WFS_GPU_PLUGINS, which
      # empties the Cuda*/Hip*Backend.cpp TUs (their #if guard) — the backends
      # live in runtime-loaded plugin DLLs built separately by
      # tools/windows/build-gpu-plugins.ps1, a release.yml concern. The
      # .vcxproj carries no CUDA include/lib paths.
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3
      - name: Build (Debug x64)
        run: msbuild Builds\VisualStudio2022\WFS-DIY.sln -p:Configuration=Debug -p:Platform=x64 -m

  linux:
    name: build (Linux)
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Validation gates (kernel hashes + dependency lint)
        # Cheap pure-python checks, seconds each: the byte-frozen GPU kernel
        # manifest must match the pinned spatcore submodule, and app→spatcore
        # includes must stay one-way. Catches a submodule bump that skipped the
        # gate ritual (tools/bump-spatcore.ps1) before any compile time is spent.
        run: |
          python3 tools/validation/kernel_hashes.py
          python3 tools/validation/spatcore_dep_lint.py
      - name: Install JUCE build deps + ccache
        # libxi-dev: JUCE 9 native XInput2 multitouch (JUCE_USE_XINPUT).
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config ccache \
            libasound2-dev libjack-jackd2-dev \
            libfreetype-dev libfontconfig1-dev \
            libgl1-mesa-dev libcurl4-openssl-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libudev-dev libxi-dev
      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-linux-${{ github.sha }}
          restore-keys: |
            ccache-linux-
      - name: Build (Debug)
        run: make -C Builds/LinuxMakefile CONFIG=Debug CXX="ccache g++" -j"$(nproc)"
