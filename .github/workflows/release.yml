name: Release

# Build distributable packages for each desktop OS and attach them to the GitHub
# Release. Runs when a Release is published, or on manual dispatch against an
# existing tag. macOS is signed + notarized + stapled; Windows ships an unsigned
# Inno Setup installer and Linux a tar.gz (no Windows code-signing cert).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and attach to (e.g. v1.0.0beta22)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name || github.event.inputs.tag }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}

jobs:
  # Refuse to publish if the tag doesn't match the in-source version, before
  # spending build minutes. Version lives in JuceLibraryCode/JuceHeader.h.
  verify-version:
    name: verify tag == versionString
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: |
          VERSION="$(sed -nE 's/.*versionString[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' \
                      JuceLibraryCode/JuceHeader.h | head -n1)"
          if [ "$RELEASE_TAG" != "v$VERSION" ]; then
            echo "::error::release tag '$RELEASE_TAG' != source 'v$VERSION'"
            exit 1
          fi
          echo "ok: $RELEASE_TAG == v$VERSION"

  macos:
    name: macOS DMG (signed + notarized)
    needs: verify-version
    runs-on: macos-latest
    # Signing cert + notary key live in the protected `WFS-DIY` environment.
    environment: WFS-DIY
    env:
      NOTARY_API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
      NOTARY_API_ISSUER: ${{ secrets.NOTARY_API_ISSUER }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Import Developer ID signing certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_PASSWORD }}
      - name: Materialize App Store Connect API key
        run: |
          mkdir -p "$RUNNER_TEMP/notary"
          KEY="$RUNNER_TEMP/notary/AuthKey.p8"
          echo "${{ secrets.NOTARY_API_KEY_BASE64 }}" | base64 --decode > "$KEY"
          echo "NOTARY_API_KEY=$KEY" >> "$GITHUB_ENV"
      - name: Build, sign, notarize, staple, package
        run: scripts/ci/build-macos-release.sh
      - name: Attach DMG to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          fail_on_unmatched_files: true
          files: |
            dist/WFS-DIY-v*-macos.dmg
            dist/WFS-DIY-v*-macos.dmg.sha256

  windows:
    name: Windows installer (unsigned)
    needs: verify-version
    # Pinned to windows-2022 (VS2022 / v143). GitHub is repointing windows-latest
    # to the VS2026 image; pin so the toolchain stays put and migrate deliberately.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      # GPU acceleration on Windows lives in the runtime-loaded plugins (the app
      # builds with WFS_GPU_PLUGINS and links no GPU runtime itself). wfs_cuda.dll
      # is compiled by tools/windows/build-gpu-plugins.ps1 below with cl.exe + the
      # CUDA toolkit headers/libs. This step sets CUDA_PATH, used by that script to
      # compile the plugin and to stage the CUDA runtime DLLs next to the exe.
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.9.0'
          method: 'network'
      - uses: microsoft/setup-msbuild@v3
      - name: Build (Release x64)
        run: msbuild Builds\VisualStudio2022\WFS-DIY.sln -p:Configuration=Release -p:Platform=x64 -m
      - name: Build GPU plugin (wfs_cuda.dll) + stage CUDA runtime; add prebuilt HIP
        shell: pwsh
        run: |
          # msbuild builds only the app; the GPU plugins are a standalone cl.exe
          # build. setup-msbuild puts msbuild (not cl.exe) on PATH, so enter the
          # MSVC dev shell here. CUDA_PATH is already set by the toolkit step.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -property installationPath
          Import-Module (Join-Path $vs 'Common7\Tools\Microsoft.VisualStudio.DevShell.dll')
          Enter-VsDevShell -VsInstallPath $vs -SkipAutomaticLocation -DevCmdArguments '-arch=x64' | Out-Null
          tools\windows\build-gpu-plugins.ps1
          # The runner has no AMD HIP SDK, so wfs_hip.dll wasn't built here -- add
          # the prebuilt copy committed in the repo so AMD users get GPU too.
          $app = 'Builds\VisualStudio2022\x64\Release\App'
          Copy-Item tools\windows\prebuilt\wfs_hip.dll $app -Force
          if (-not (Test-Path "$app\wfs_cuda.dll")) { throw 'wfs_cuda.dll was not built -- GPU would silently fall back to CPU' }
          Get-ChildItem $app -Filter '*.dll' | Where-Object { $_.Name -match 'wfs_|cudart|nvrtc' } | Format-Table Name,Length
      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          # Compile the Inno Setup installer. It bundles the Release exe, the GPU
          # plugins (wfs_cuda.dll built above + the prebuilt wfs_hip.dll) and the
          # CUDA runtime DLLs staged next to them (cudart + main nvrtc64, excluding
          # the ~85 MB .alt twin), the language files (Resources/lang/*.json), the
          # app icon, LICENSE / README / third-party notices, and the .wfs file
          # association. The vendor driver APIs (nvcuda.dll / amdhip64) ship with
          # the GPU drivers and are NOT redistributed. Pass the release version so
          # the installer's AppVersion + filename match the tag.
          $ver  = "${{ env.RELEASE_TAG }}" -replace '^v',''
          $base = "WFS-DIY-${{ env.RELEASE_TAG }}-windows-x64-Setup"
          New-Item -ItemType Directory -Force dist | Out-Null
          choco install innosetup -y --no-progress
          $iscc = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }
          & $iscc "/DMyAppVersion=$ver" "/Odist" "/F$base" "Installer\WFS-DIY-Installer.iss"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compile failed ($LASTEXITCODE)" }
          $exe = "dist\$base.exe"
          if (-not (Test-Path $exe)) { throw "Installer not produced: $exe" }
          (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower() | Out-File "$exe.sha256" -NoNewline
      - name: Attach installer to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          fail_on_unmatched_files: true
          files: |
            dist/WFS-DIY-*-windows-x64-Setup.exe
            dist/WFS-DIY-*-windows-x64-Setup.exe.sha256

  linux:
    name: Linux tar.gz
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      # GPU acceleration on Linux lives in a runtime-loaded plugin, same as
      # Windows. This installs the CUDA toolkit so build-app-tarball.sh (via
      # tools/linux/build-gpu-plugins.sh) can compile libwfs_cuda.so and bundle
      # its runtime closure (libcudart, libnvrtc) into the tarball's gpu/lib.
      # No equivalent for AMD/HIP yet: ROCm has no lightweight CI action and a
      # full install is multi-GB/slow on a shared runner, so the Linux release
      # tarball ships without libwfs_hip.so for now (CPU fallback on AMD) --
      # see docs/CI_SETUP.md.
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.9.0'
          method: 'network'
      - name: Apply Linux JUCE patches
        # Enables touch input on Linux (canUseTouch -> true) so the userland
        # evdev multitouch backend works. The submodule ships unpatched, so this
        # must run after checkout and before the build. Idempotent.
        run: tools/apply-linux-juce-patches.sh
      - name: Install JUCE build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libasound2-dev libjack-jackd2-dev \
            libfreetype-dev libfontconfig1-dev \
            libgl1-mesa-dev libcurl4-openssl-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev libudev-dev
      - name: Build (Release)
        run: make -C Builds/LinuxMakefile CONFIG=Release -j"$(nproc)"
      - name: Package
        run: |
          mkdir -p dist
          # Single source of truth for the Linux package: build-app-tarball.sh
          # stages the binary + runtime data (lang/, MCP/resources/,
          # MCP/generated_tools.json), the logo, udev rules, a .desktop entry,
          # install.sh / uninstall.sh, and (BUNDLE_GPU=auto) the GPU plugin(s)
          # built above. Override the output dir + name so the asset matches
          # the release convention (WFS-DIY-<tag>-linux-x86_64.tar.gz),
          # consistent with macOS/Windows.
          OUTPUT_DIR="$PWD/dist" \
          TARBALL_NAME="WFS-DIY-${RELEASE_TAG}-linux-x86_64" \
            tools/linux/build-app-tarball.sh
          TAR="dist/WFS-DIY-${RELEASE_TAG}-linux-x86_64.tar.gz"
          sha256sum "$TAR" | awk '{print $1}' > "$TAR.sha256"
      - name: Attach tar.gz to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          fail_on_unmatched_files: true
          files: |
            dist/WFS-DIY-*-linux-x86_64.tar.gz
            dist/WFS-DIY-*-linux-x86_64.tar.gz.sha256
