name: Release

# Build distributable packages for each desktop OS and attach them to the GitHub
# Release. Runs when a Release is published, or on manual dispatch against an
# existing tag. macOS is signed + notarized + stapled; Windows/Linux ship as
# archives (Windows is intentionally unsigned — no code-signing cert).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and attach to (e.g. v1.0.0beta22)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name || github.event.inputs.tag }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}

jobs:
  # Refuse to publish if the tag doesn't match the in-source version, before
  # spending build minutes. Version lives in JuceLibraryCode/JuceHeader.h.
  verify-version:
    name: verify tag == versionString
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: |
          VERSION="$(sed -nE 's/.*versionString[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' \
                      JuceLibraryCode/JuceHeader.h | head -n1)"
          if [ "$RELEASE_TAG" != "v$VERSION" ]; then
            echo "::error::release tag '$RELEASE_TAG' != source 'v$VERSION'"
            exit 1
          fi
          echo "ok: $RELEASE_TAG == v$VERSION"

  macos:
    name: macOS DMG (signed + notarized)
    needs: verify-version
    runs-on: macos-latest
    # Signing cert + notary key live in the protected `WFS-DIY` environment.
    environment: WFS-DIY
    env:
      NOTARY_API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
      NOTARY_API_ISSUER: ${{ secrets.NOTARY_API_ISSUER }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Import Developer ID signing certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_PASSWORD }}
      - name: Materialize App Store Connect API key
        run: |
          mkdir -p "$RUNNER_TEMP/notary"
          KEY="$RUNNER_TEMP/notary/AuthKey.p8"
          echo "${{ secrets.NOTARY_API_KEY_BASE64 }}" | base64 --decode > "$KEY"
          echo "NOTARY_API_KEY=$KEY" >> "$GITHUB_ENV"
      - name: Build, sign, notarize, staple, package
        run: scripts/ci/build-macos-release.sh
      - name: Attach DMG to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          fail_on_unmatched_files: true
          files: |
            dist/WFS-DIY-v*-macos.dmg
            dist/WFS-DIY-v*-macos.dmg.sha256

  windows:
    name: Windows zip (unsigned)
    needs: verify-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      # The native GPU WFS algorithm (WFS_GPU_NATIVE) compiles a CUDA backend on
      # Windows, so the build needs the CUDA toolkit headers/libs. This sets
      # CUDA_PATH, used by the .vcxproj include/lib paths and by the postbuild
      # step that stages the CUDA runtime DLLs next to the exe.
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.9.0'
          method: 'network'
      - uses: microsoft/setup-msbuild@v3
      - name: Build (Release x64)
        run: msbuild Builds\VisualStudio2022\WFS-DIY.sln -p:Configuration=Release -p:Platform=x64 -m
      - name: Package
        shell: pwsh
        run: |
          # Ship the standalone exe plus the CUDA runtime DLLs it loads at run
          # time (NVRTC + cudart, staged next to the exe by the build's postbuild
          # step). The driver API (nvcuda.dll) ships with the NVIDIA driver and is
          # NOT redistributed. NOT the whole App output folder, which also
          # contains the multi-hundred-MB WFS-DIY.pdb debug-symbols file.
          $exe = Get-ChildItem -Recurse -File -Filter "WFS-DIY.exe" `
            -Path "Builds\VisualStudio2022\x64\Release" | Select-Object -First 1
          if (-not $exe) { throw "Release WFS-DIY.exe not found" }
          $appDir = $exe.Directory.FullName
          $dlls = foreach ($p in @("cudart64_*.dll", "nvrtc64_*.dll", "nvrtc-builtins64_*.dll")) {
            Get-ChildItem -File -Path (Join-Path $appDir $p) -ErrorAction SilentlyContinue
          }
          if (-not $dlls) { throw "CUDA runtime DLLs not found next to the exe (postbuild copy failed?)" }
          $files = @($exe.FullName) + ($dlls | ForEach-Object FullName)
          # RELEASE_TAG already starts with 'v' — don't prefix another one.
          $zip = "dist\WFS-DIY-${{ env.RELEASE_TAG }}-windows-x64.zip"
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path $files -DestinationPath $zip -Force
          (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower() | Out-File "$zip.sha256" -NoNewline
      - name: Attach zip to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          fail_on_unmatched_files: true
          files: |
            dist/WFS-DIY-*-windows-x64.zip
            dist/WFS-DIY-*-windows-x64.zip.sha256

  linux:
    name: Linux tar.gz
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Apply Linux JUCE patches
        # Enables touch input on Linux (canUseTouch -> true) so the userland
        # evdev multitouch backend works. The submodule ships unpatched, so this
        # must run after checkout and before the build. Idempotent.
        run: tools/apply-linux-juce-patches.sh
      - name: Install JUCE build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libasound2-dev libjack-jackd2-dev \
            libfreetype-dev libfontconfig1-dev \
            libgl1-mesa-dev libcurl4-openssl-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev libudev-dev
      - name: Build (Release)
        run: make -C Builds/LinuxMakefile CONFIG=Release -j"$(nproc)"
      - name: Package
        run: |
          mkdir -p dist
          # Single source of truth for the Linux package: build-app-tarball.sh
          # stages the binary + runtime data (lang/, MCP/resources/), the logo,
          # udev rules, a .desktop entry, and install.sh / uninstall.sh. Override
          # the output dir + name so the asset matches the release convention
          # (WFS-DIY-<tag>-linux-x86_64.tar.gz), consistent with macOS/Windows.
          OUTPUT_DIR="$PWD/dist" \
          TARBALL_NAME="WFS-DIY-${RELEASE_TAG}-linux-x86_64" \
            tools/linux/build-app-tarball.sh
          TAR="dist/WFS-DIY-${RELEASE_TAG}-linux-x86_64.tar.gz"
          sha256sum "$TAR" | awk '{print $1}' > "$TAR.sha256"
      - name: Attach tar.gz to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          fail_on_unmatched_files: true
          files: |
            dist/WFS-DIY-*-linux-x86_64.tar.gz
            dist/WFS-DIY-*-linux-x86_64.tar.gz.sha256
